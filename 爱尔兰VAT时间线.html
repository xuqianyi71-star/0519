            legend: { data: ['转化率', '加购率', '毛利率'], top: 40 },
            grid: { top: '20%', left: '7%', right: '8%', bottom: '12%' },
            xAxis: { type: 'category', data: dateAxisFull, axisLabel: { rotate: 35 } },
            yAxis: [
                { type: 'value', name: '率 (%)', min: 0, max: 12 },
                { type: 'value', name: '毛利率 (%)', min: -60, max: 25, position: 'right' }
            ],
            series: [
                { name: '转化率', type: 'line', smooth: true, yAxisIndex: 0, data: cvrData },
                { name: '加购率', type: 'line', smooth: true, yAxisIndex: 0, data: addcartData },
                { name: '毛利率', type: 'bar', yAxisIndex: 1, data: gpmData, itemStyle: { color: p => p.value >=0 ? '#ff4d4f' : '#52c41a' } },
                { name: '事件', type: 'line', data: [], markLine: { data: eventMarkLines, symbol: 'none' }, lineStyle: { opacity:0 }, showSymbol: false }
            ]
        };

        function updateSlicer(metricKey) {
            const cfg = {
                browse: { name: '浏览人数', data: browseData, yName: '人数' },
                sales: { name: '销售额', data: salesData, yName: '金额' },
                roi: { name: 'ROI', data: roiData, yName: '系数' },
                grossProfit: { name: '毛利润', data: grossProfitData, yName: '金额' },
                avgOrder: { name: '客单价', data: avgOrderData, yName: '金额' },
                cpc: { name: 'CPC', dataFB: cpcFBData, dataGG: cpcGGData, type:'multi' }
            }[metricKey];
            let yAxis = { type:'value', name: cfg.yName };
            if (metricKey === 'browse') yAxis.min = 2800;
            if (metricKey === 'sales') yAxis.min = 1000;
            if (metricKey === 'roi') { yAxis.min = 0.8; yAxis.max = 2.6; }
            if (metricKey === 'grossProfit') { yAxis.min = -2500; yAxis.max = 1500; }
            if (metricKey === 'avgOrder') { yAxis.min = 35; yAxis.max = 60; }
            if (metricKey === 'cpc') { yAxis.min = 0.3; yAxis.max = 1.0; }
            let opt = {
                title: { text: cfg.name, left:'center' },
                tooltip: { trigger:'axis' },
                xAxis: { type:'category', data: dateAxisFull, axisLabel: { rotate:35 } },
                yAxis: yAxis,
                grid: { bottom:'15%', containLabel:true },
                series: []
            };
            if (cfg.type === 'multi') {
                opt.legend = { data: ['Facebook','Google'], top:30 };
                opt.series = [
                    { name:'Facebook', type:'line', data: cfg.dataFB, smooth:true, markLine: { data: eventMarkLines } },
                    { name:'Google', type:'line', data: cfg.dataGG, smooth:true, markLine: { data: eventMarkLines } }
                ];
            } else {
                opt.series = [{ name: cfg.name, type:'line', data: cfg.data, smooth:true, markLine: { data: eventMarkLines } }];
            }
            slicerChart.setOption(opt, true);
        }

        function buildSlicerButtons() {
            const group = document.getElementById('slicerBtnGroup');
            group.innerHTML = '';
            const metrics = ['browse','sales','roi','grossProfit','avgOrder','cpc'];
            const names = ['浏览人数','销售额','ROI','毛利润','客单价','CPC'];
            metrics.forEach((key, i) => {
                const btn = document.createElement('button');
                btn.className = 'slicer-btn' + (i===0?' active':'');
                btn.innerText = names[i];
                btn.onclick = () => {
                    group.querySelectorAll('.slicer-btn').forEach(b=>b.classList.remove('active'));
                    btn.classList.add('active');
                    updateSlicer(key);
                };
                group.appendChild(btn);
            });
            return metrics[0];
        }

        // 维度二图表: 使用不含基准的日期序列
        const daysWithoutBase = dateAxisFull.slice(1);

        const option2_1 = {
            title: { text: '提交订单率 & 支付成功率', left:'center' },
            tooltip: { trigger:'axis' },
            legend: { data: ['提交订单率','支付成功率'], top:40 },
            grid: { top:'22%', left:'7%', right:'8%', bottom:'12%' },
            xAxis: { type:'category', data: daysWithoutBase, axisLabel: { rotate:35 } },
            yAxis: [
                { type:'value', name:'提交率 (%)', min:45, max:85 },
                { type:'value', name:'支付成功率 (%)', min:70, max:100, position:'right' }
            ],
            series: [
                { name:'提交订单率', type:'line', smooth:true, yAxisIndex:0, data: submitData.slice(1) },
                { name:'支付成功率', type:'line', smooth:true, yAxisIndex:1, data: payData.slice(1) },
                { name:'事件', type:'line', data:[], markLine: { data: eventMarkLines }, lineStyle:{opacity:0}, showSymbol:false }
            ]
        };

        const option2_2 = {
            title: { text: '填写地址率 & 选择物流率', left:'center' },
            tooltip: { trigger:'axis' },
            legend: { data: ['填写地址率','选择物流率'], top:40 },
            grid: { top:'22%', left:'7%', right:'8%', bottom:'12%' },
            xAxis: { type:'category', data: daysWithoutBase, axisLabel: { rotate:35 } },
            yAxis: [
                { type:'value', name:'填写地址率 (%)', min:70, max:100 },
                { type:'value', name:'选择物流率 (%)', min:70, max:100, position:'right' }
            ],
            series: [
                { name:'填写地址率', type:'line', smooth:true, yAxisIndex:0, data: addressRate, lineStyle:{color:'#722ed1',width:3} },
                { name:'选择物流率', type:'line', smooth:true, yAxisIndex:1, data: logisticsRate, lineStyle:{color:'#13c2c2',width:3} },
                { name:'事件', type:'line', data:[], markLine: { data: eventMarkLines }, lineStyle:{opacity:0}, showSymbol:false }
            ]
        };

        function setConclusion(tab) {
            const title = document.getElementById('conclusionTabName');
            const content = document.getElementById('conclusionContent');
            if (tab === '1') {
                title.innerText = '维度一：全站核心趋势';
                content.innerHTML = `<ul>
                    <li><b>VAT上线冲击猛烈</b>：3/12加征23%税后转化率从3.71%腰斩，毛利率一度跌至-52.82%。</li>
                    <li><b>首次改价止跌</b>：3/16热卖品改价后转化小幅回升，但利润仍为负值。</li>
                    <li><b>3/20多项优化集中落地</b>：快递物流不加税、前端删除税费描述、二次改价同步执行，但流量基数小导致反馈不明显。</li>
                    <li><b>后续调整逐步显效</b>：4/2结算传值含税、4/10全站统一售价后，毛利率波动收窄，支付成功率维持高位。4/10结算前传值异常对部分数据造成扰动。</li>
                    <li><b>CPC持续走低</b>：FB/Google CPC自VAT后下降，获客成本降低但精准度可能受影响。</li>
                    <li><b>5月中上旬数据表现</b>：5月后浏览与转化有所恢复，毛利率改善明显，ROI回升至2.0以上，后续仍需关注可持续性。</li>
                </ul>`;
            } else {
                title.innerText = '维度二：结算端表现';
                content.innerHTML = `<ul>
                    <li><b>提交订单率波动中提升</b>：3/20多项优化后提交率一度超过70%，4/10统一售价后维持较好水平，后续偶有回落但整体趋于平稳。</li>
                    <li><b>支付成功率稳健</b>：多数时间在85%以上，4月后接近95%，5月仍保持高位。</li>
                    <li><b>地址填写率起伏较大</b>：3/24达到峰值94.29%，后期回落至80%附近，5月波动在80%~92%之间，可能与税费显示策略调整有关。</li>
                    <li><b>物流选择率高位运行</b>：整体在85%~96%，用户对物流选项敏感度较低，5月出现小幅下探至79%左右，需关注是否与活动或页面调整相关。</li>
                </ul>`;
            }
        }

        function updateEventNote() {
            const div = document.getElementById('eventNoteArea');
            div.innerHTML = `
                <div style="display:flex; flex-wrap:wrap; gap:20px; justify-content:space-between;">
                    <div><strong style="color:#ff4d4f;">3/12</strong> VAT上线 (加征23%税)</div>
                    <div><strong style="color:#fa8c16;">3/16</strong> 第一次热卖品改价</div>
                    <div><strong style="color:#f5222d;">3/19</strong> 复活节物流时效不可达</div>
                    <div><strong style="color:#52c41a;">3/20</strong> 多项优化 (快递不加税/去税费描述/二次改价)</div>
                    <div><strong style="color:#1890ff;">4/2</strong> IE结算传值改为含税价</div>
                    <div><strong style="color:#722ed1;">4/10</strong> 全站统一售价 & 支付语言包调整</div>
                    <div><strong style="color:#eb2f96;">4/10</strong> 结算前传值异常</div>
                </div>
            `;
        }

        function switchTab(tabId) {
            const isDim1 = tabId === '1';
            document.getElementById('mainContainer').style.display = isDim1 ? 'block' : 'none';
            document.getElementById('dim2Container').style.display = isDim1 ? 'none' : 'block';
            setConclusion(tabId);
            if (isDim1) {
                mainChart.setOption(option1, true);
                const firstMetric = buildSlicerButtons();
                updateSlicer(firstMetric);
                setTimeout(() => { mainChart.resize(); slicerChart.resize(); }, 50);
            } else {
                dim2Chart1.setOption(option2_1, true);
                dim2Chart2.setOption(option2_2, true);
                setTimeout(() => { dim2Chart1.resize(); dim2Chart2.resize(); }, 50);
            }
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
                this.classList.add('active');
                switchTab(this.dataset.tab);
            });
        });

        // 初始化
        updateEventNote();
        switchTab('1');
        window.addEventListener('resize', () => {
            mainChart.resize();
            slicerChart.resize();
            dim2Chart1.resize();
            dim2Chart2.resize();
        });
    })();
</script>
</body>
</html>
