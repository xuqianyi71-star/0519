                        document.querySelectorAll('#slicerBtnGroup .slicer-btn').forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                        if (tabId === '1') updateSlicerChartDim1(key);
                        else updateSlicerChartDim3(key);
                    };
                    btnGroup.appendChild(btn);
                });
                return firstKey;
            }

            function updateSlicerChartDim1(metricKey) {
                const cfg = metricConfigDim1[metricKey];
                let yAxisConfig = { type: 'value', name: cfg.yName, axisLabel: { formatter: '{value}' + cfg.unit } };
                if (metricKey === 'browse') yAxisConfig = { ...yAxisConfig, min: 9000, max: 21000 };
                if (metricKey === 'sales') yAxisConfig = { ...yAxisConfig, min: 9000, max: 25000 };
                if (metricKey === 'roi') yAxisConfig = { ...yAxisConfig, min: 1.4, max: 2.5 };
                if (metricKey === 'avgOrder') yAxisConfig = { ...yAxisConfig, min: 38, max: 65 };
                if (metricKey === 'ck') yAxisConfig = { ...yAxisConfig, min: 48, max: 65 };
                if (metricKey === 'cpc') yAxisConfig = { ...yAxisConfig, min: 0.35, max: 1.2 };
                let option = {
                    title: { text: `${cfg.name} 趋势`, left: 'center' },
                    tooltip: { trigger: 'axis' },
                    xAxis: { type: 'category', data: dateAxisFull, axisLabel: { rotate: 35 } },
                    yAxis: yAxisConfig,
                    grid: { bottom: '15%', containLabel: true }
                };
                if (cfg.type === 'single') {
                    option.series = [{ name: cfg.name, type: 'line', data: cfg.data, smooth: true, markLine: { data: eventMarkLines } }];
                } else {
                    option.legend = { data: ['Facebook', 'Google'], top: 30 };
                    option.series = [
                        { name: 'Facebook', type: 'line', data: cfg.dataFB, smooth: true, markLine: { data: eventMarkLines } },
                        { name: 'Google', type: 'line', data: cfg.dataGG, smooth: true, markLine: { data: eventMarkLines } }
                    ];
                }
                slicerChart.setOption(option, true);
            }

            const eventMarkLines = [
                { xAxis: '3/11', name: 'GST/PST 上线', lineStyle: { color: '#ff4d4f', width: 2, type: 'dashed' }, label: { show: true, formatter: 'GST/PST 上线', position: 'end', offset: [5, 20], fontSize: 11, fontWeight: 'bold', color: '#ff4d4f', backgroundColor: 'rgba(255,255,255,0.8)', padding: [2, 6, 2, 6], borderColor: '#ff4d4f', borderWidth: 1, borderRadius: 12 } },
                { xAxis: '3/20', name: '经济线物流时效不可达', lineStyle: { color: '#d46b08', width: 2, type: 'dashed' }, label: { show: true, formatter: '物流时效不可达', position: 'end', offset: [5, 20], fontSize: 11, fontWeight: 'bold', color: '#d46b08', backgroundColor: 'rgba(255,255,255,0.8)', padding: [2, 6, 2, 6], borderColor: '#d46b08', borderWidth: 1, borderRadius: 12 } },
                { xAxis: '4/2', name: '默认税费显示调整', lineStyle: { color: '#1890ff', width: 2, type: 'dashed' }, label: { show: true, formatter: '默认税费显示调整', position: 'end', offset: [5, 20], fontSize: 11, fontWeight: 'bold', color: '#1890ff', backgroundColor: 'rgba(255,255,255,0.8)', padding: [2, 6, 2, 6], borderColor: '#1890ff', borderWidth: 1, borderRadius: 12 } },
                { xAxis: '4/23', name: '母亲节经济线不可达', lineStyle: { color: '#722ed1', width: 2, type: 'dashed' }, label: { show: true, formatter: '母亲节经济线不可达', position: 'end', offset: [5, 20], fontSize: 11, fontWeight: 'bold', color: '#722ed1', backgroundColor: 'rgba(255,255,255,0.8)', padding: [2, 6, 2, 6], borderColor: '#722ed1', borderWidth: 1, borderRadius: 12 } }
            ];

            const option1 = {
                title: { text: '维度一：全站核心趋势 (转化/加购/毛利)', left: 'center', top: 8, textStyle: { fontSize: 16 } },
                tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
                legend: { data: ['转化率', '加购率', '毛利率'], top: 48 },
                grid: { top: '18%', left: '7%', right: '8%', bottom: '12%', containLabel: true },
                xAxis: { type: 'category', data: dateAxisFull, axisLabel: { rotate: 35, fontSize: 11 } },
                yAxis: [
                    { type: 'value', name: '率 (%)', min: 1.5, max: 11, axisLabel: { formatter: '{value}%' } },
                    { type: 'value', name: '毛利率 (%)', min: -12, max: 20, position: 'right', axisLabel: { formatter: '{value}%' } }
                ],
                series: [
                    { name: '转化率', type: 'line', smooth: true, yAxisIndex: 0, data: cvr2026_full },
                    { name: '加购率', type: 'line', smooth: true, yAxisIndex: 0, data: addcart2026_full },
                    { name: '毛利率', type: 'bar', yAxisIndex: 1, data: gpm2026_full, itemStyle: { color: p => p.value >= 0 ? '#ff4d4f' : '#52c41a' } },
                    { name: '事件标记', type: 'line', yAxisIndex: 0, data: [], markLine: { data: eventMarkLines, symbol: ['none', 'none'] }, lineStyle: { opacity: 0 }, showSymbol: false, silent: true }
                ]
            };

            const option2 = {
                title: { text: '维度二：结算端提交与支付表现', left: 'center', top: 8, textStyle: { fontSize: 16 } },
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                legend: { data: ['提交订单率', '支付成功率'], top: 48 },
                grid: { top: '18%', left: '7%', right: '8%', bottom: '12%' },
                xAxis: { type: 'category', data: daysWithoutBase, axisLabel: { rotate: 35, fontSize: 11 } },
                yAxis: [
                    { type: 'value', name: '提交订单率 (%)', min: 48, max: 60, axisLabel: { formatter: '{value}%' } },
                    { type: 'value', name: '支付成功率 (%)', min: 83, max: 98, position: 'right', axisLabel: { formatter: '{value}%' } }
                ],
                series: [
                    { name: '提交订单率', type: 'line', smooth: true, yAxisIndex: 0, data: submit2026_trimmed, markLine: { data: [{ yAxis: 56.72, name: '基准', lineStyle: { color: '#1890ff', type: 'dashed' } }] } },
                    { name: '支付成功率', type: 'line', smooth: true, yAxisIndex: 1, data: pay2026_trimmed, markLine: { data: [{ yAxis: 92.84, name: '基准', lineStyle: { color: '#52c41a', type: 'dashed' } }] } },
                    { name: '事件标记', type: 'line', yAxisIndex: 0, data: [], markLine: { data: eventMarkLines, symbol: ['none', 'none'] }, lineStyle: { opacity: 0 }, showSymbol: false, silent: true }
                ]
            };

            function getOption2Extra() {
                const addrVals = addressRateData.map(v => v * 100);
                const logisVals = logisticsRateData.map(v => v * 100);
                const addrMin = Math.floor(Math.min(...addrVals)) - 2;
                const addrMax = Math.ceil(Math.max(...addrVals)) + 2;
                const logisMin = Math.floor(Math.min(...logisVals)) - 2;
                const logisMax = Math.ceil(Math.max(...logisVals)) + 2;
                return {
                    title: { text: '维度二：填写地址率与选择物流率趋势', left: 'center', top: 8, textStyle: { fontSize: 16 } },
                    tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                    legend: { data: ['填写地址率', '选择物流率'], top: 48 },
                    grid: { top: '22%', left: '7%', right: '8%', bottom: '12%', containLabel: true },
                    xAxis: { type: 'category', data: daysWithoutBase, axisLabel: { rotate: 35, fontSize: 11 } },
                    yAxis: [
                        { type: 'value', name: '填写地址率 (%)', min: addrMin, max: addrMax, axisLabel: { formatter: '{value}%' } },
                        { type: 'value', name: '选择物流率 (%)', min: logisMin, max: logisMax, position: 'right', axisLabel: { formatter: '{value}%' } }
                    ],
                    series: [
                        { name: '填写地址率', type: 'line', smooth: true, yAxisIndex: 0, data: addrVals.map(v => v.toFixed(2)), lineStyle: { color: '#722ed1', width: 3 } },
                        { name: '选择物流率', type: 'line', smooth: true, yAxisIndex: 1, data: logisVals.map(v => v.toFixed(2)), lineStyle: { color: '#13c2c2', width: 3 } },
                        { name: '事件标记', type: 'line', yAxisIndex: 0, data: [], markLine: { data: eventMarkLines, symbol: ['none', 'none'] }, lineStyle: { opacity: 0 }, showSymbol: false, silent: true }
                    ]
                };
            }

            function updateEventNote(tabId) {
                const div = document.getElementById('eventNoteArea');
                if (tabId === '3') {
                    div.innerHTML = `<div class="event-item"><strong style="color: #d46b08;">经济线物流时效不可达 (Day10 / 3/20 全天)</strong><br/>复活节物流影响：结算页预估经济线时效在复活节前不可达。</div>`;
                } else {
                    div.innerHTML = `<div class="event-grid">
                        <div class="event-item"><strong style="color:#ff4d4f;">GST/PST 上线 (3/11 15:00)</strong><br/>加拿大站点 GST/PST 上线，购物车和CK环节显示 "calculated at checkout"。</div>
                        <div class="event-item"><strong style="color:#d46b08;">经济线物流时效不可达 (3/20 全天)</strong><br/>复活节物流影响：结算页预估经济线时效在复活节前不可达。</div>
                        <div class="event-item"><strong style="color:#722ed1;">母亲节经济线不可达 (4/23)</strong><br/>母亲节物流影响：经济线时效在母亲节前不可达。</div>
                    </div>`;
                }
            }

            const conclusionTexts = {
                '1': { title: '维度一：全站趋势复盘', content: `<ul><li><strong>GST/PST税费冲击显著</strong>：3/11税费上线后，转化率从基准2.78%大幅波动，最低跌至1.58%（4/3），上线后的平均值为2.47%，仍低于基准水平。这表明税费感知对用户的购买决策产生了持续的负面影响。</li><li><strong>毛利率剧烈波动且均值下滑</strong>：毛利率在-6.00%至17.37%之间大幅波动，均值为6.61%，远低于基准的9.85%。虽然3/31受大金额订单影响冲高至17.37%，但整体盈利能力受税费政策挤压明显。</li><li><strong>加购率受物流时效影响</strong>：由于加拿大站前端不显示税费，加购率受税费上线影响较小。但在3/20-3/25期间，受复活节经济线物流不可达影响，加购率出现明显下滑，随后逐步回升。</li><li><strong>CPC成本下降但流量质量存疑</strong>：FB-CPC从基准0.50降至均值0.46，Google-CPC从基准0.95降至均值0.85。虽然获客成本降低，但可能存在流量不够精准、优质流量减少的问题。</li></ul>` },
                '2': { title: '维度二：结算端提交与支付表现复盘', content: `<ul><li><strong>提交订单率持续承压</strong>：提交订单率从基准56.72%波动下行，平均为54.90%，最低跌至50.31%（3/27）。税费感知导致用户在最后结算环节的犹豫度增加。</li><li><strong>支付成功率保持稳定</strong>：支付成功率基准为92.84%，平均为92.62%。由于提交订单环节已筛选掉部分高敏感用户，后端支付环节受影响较小，目前已趋于平稳。</li><li><strong>税费显示策略调整见效</strong>：4/2将默认税费显示调整为“填写地址后计算”后，4/3-4/13的地址填写率均值从调整前的74.34%提升至77.51%，显示该策略有效缓解了用户初期的税费焦虑。</li></ul>` },
                '3': { title: '年度同比分析 (2026 vs 2025)', content: `<ul><li><strong>业务规模翻倍增长</strong>：2026年同期浏览人数达432,418，较2025年（215,858）增长100.3%，业务规模实现大幅扩张。</li><li><strong>核心转化指标全面下滑</strong>：受税费政策冲击，转化率从2025年同期的3.20%降至2.47%，提交订单率从59.35%降至54.90%。</li><li><strong>物流敏感度增加</strong>：2026年3/20物流时效不可达导致加购率从9.88%骤降至6.48%，而2025年同期由于复活节商品占比极低（仅6.74%），受物流影响微乎其微。</li><li><strong>2025年复活节商品占比较低</strong>：2025年复活节期间，加拿大站点热卖商品中复活节商品占比较小，热卖品TOP1为高尔夫球印章，流量占全站18%。全站浏览人数中，非复活节商品占比为93.26%，复活节商品为6.74%。</li></ul>` }
            };
            function updateConclusion(tabId) {
                const data = conclusionTexts[tabId];
                document.getElementById('conclusionTabName').innerText = data.title;
                document.getElementById('conclusionContent').innerHTML = data.content;
            }

            let currentTab = '1';
            let currentDim3Panel = 'yoy';

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentTab = this.getAttribute('data-tab');
                    document.getElementById('dim3PanelContainer').style.display = (currentTab === '3' ? 'block' : 'none');
                    document.getElementById('mainContainer').style.display = (currentTab === '3' ? 'none' : 'block');
                    document.getElementById('slicerChartContainer').style.display = (currentTab === '2' ? 'none' : 'block');
                    document.getElementById('dim2ExtraChartContainer').style.display = (currentTab === '2' ? 'block' : 'none');
                    document.getElementById('slicerTitle').innerText = (currentTab === '1' ? '维度一核心指标趋势 (切片器)' : '年度同比分析指标对比 (切片器)');
                    updateEventNote(currentTab);
                    updateConclusion(currentTab);
                    const firstMetric = updateSlicerButtons(currentTab);
                    if (currentTab === '1') {
                        myChart.setOption(option1, true);
                        updateSlicerChartDim1(firstMetric);
                    } else if (currentTab === '2') {
                        myChart.setOption(option2, true);
                        setTimeout(() => {
                            dim2ExtraChart.resize();
                            dim2ExtraChart.setOption(getOption2Extra(), true);
                            setTimeout(() => { dim2ExtraChart.resize(); }, 150);
                        }, 50);
                    } else {
                        updateSlicerChartDim3(firstMetric);
                    }
                });
            });

            document.querySelectorAll('#dim3PanelBtns .slicer-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('#dim3PanelBtns .slicer-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentDim3Panel = this.getAttribute('data-panel');
                    const activeMetric = document.querySelector('#slicerBtnGroup .slicer-btn.active').getAttribute('data-metric');
                    updateSlicerChartDim3(activeMetric);
                });
            });

            window.addEventListener('resize', () => { myChart.resize(); slicerChart.resize(); dim2ExtraChart.resize(); });

            updateEventNote('1');
            updateConclusion('1');
            const initMetric = updateSlicerButtons('1');
            myChart.setOption(option1);
            updateSlicerChartDim1(initMetric);
        };
    </script>
</body>
</html>
